#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "libreerp"
name = "LibreERP"
description.en = "Suite of business apps (ERP: CRM, Accounting, Point of Sale, HR, Purchases...)"
description.fr = "Une collection d'apps de gestion d'entreprise (ERP : CRM, Comptabilité, Point de Vente, RH, Achats...)"

version = "17.0~ynh1"

maintainers = ["ljf"]

[upstream]
license = "LGPL-3.0-only"
website = "https://odoo.com"
demo = "https://www.odoo.com/trial"
admindoc = "https://www.odoo.com/documentation/16.0/administration.html"
userdoc = "https://www.odoo.com/documentation/16.0/applications.html"
code = "https://github.com/odoo/odoo"
cpe = "cpe:2.3:a:odoo:odoo"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = true

disk = "500M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.app_version]
    ask.en = "Choose the version you want"
    ask.fr = "Choisissez la version désirée"
    type = "select"
    choices = ["17", "18", "19"]
    default = "19"

    [install.lang]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["sq_AL", "am_ET", "ar_SY", "eu_ES", "bs_BA", "bg_BG", "my_MM", "ca_ES", "zh_CN", "zh_HK", "zh_TW", "hr_HR", "cs_CZ", "da_DK", "nl_BE", "nl_NL", "en_AU", "en_GB", "en_US", "et_EE", "fi_FI", "fr_BE", "fr_CA", "fr_CH", "fr_FR", "gl_ES", "ka_GE", "de_CH", "de_DE", "el_GR", "gu_IN", "he_IL", "hi_IN", "hu_HU", "id_ID", "it_IT", "ja_JP", "kab_DZ", "ko_KP", "ko_KR", "lo_LA", "lv_LV", "lt_LT", "mk_MK", "mn_MN", "nb_NO", "fa_IR", "pl_PL", "pt_BR", "pt_PT", "ro_RO", "ru_RU", "sr_RS", "sr@latin", "sk_SK", "sl_SI", "es_AR", "es_BO", "es_CL", "es_CO", "es_CR", "es_DO", "es_EC", "es_GT", "es_MX", "es_PA", "es_PE", "es_PY", "es_UY", "es_VE", "es_ES", "sv_SE", "te_IN", "th_TH", "tr_TR", "uk_UA", "vi_VN"]
    default = "en_US"

    [install.admin]
    type = "user"

    [install.admin_password]
    ask.en = "Choose a strong master admin password"
    ask.fr = "Choisissez un mot de passe maître fort pour l'administration"
    type = "password"

[resources]
    [resources.sources]
    [resources.sources.main_19_oca]
    url = "https://github.com/OCA/OCB/archive/41b5d41bf21b29dc891fee42b7d317b47caf00bf.tar.gz"
    sha256 = "5c443d886ae1cb4f4bcc34c99b82e976a5f6ce7a28199fbc3b29867c8260d835"
    prefetch = false

    [resources.sources.main_18_oca]
    url = "https://github.com/OCA/OCB/archive/4f7561521f28d4e02bcd6c22329283bd75f501bc.tar.gz"
    sha256 = "a42c579549f85318ef20706ead45ba5451a8ef58fb44da0e9beed3a81a9cde83"
    prefetch = false

    [resources.sources.main_17_oca]
    url = "https://github.com/OCA/OCB/archive/c5b2b71479460452f25da22acb048bd129e044b8.tar.gz"
    sha256 = "ae89a7bc145b40f5f5a46be3251b7a05a22df133ea4dd010f163b0bb20a8d1a9"
    prefetch = false

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 8069
    chat.default = 8072

    [resources.apt]
    packages = [
        "build-essential",

        # support for multilingual fonts
        "fonts-dejavu-core\\|fonts-freefont-ttf\\|fonts-freefont-otf\\|fonts-noto-core",
        "fonts-inconsolata",
        "fonts-font-awesome",
        "fonts-roboto-unhinted",
        "gsfonts",
        "libjs-underscore",
        "lsb-base",
        "postgresql-client",
        "python3-asn1crypto",
        "python3-babel",
        "python3-cbor2",
        "python3-chardet",
        "python3-cryptography",
        "python3-dateutil",
        "python3-decorator",
        "python3-docutils",
        "python3-freezegun",
        "python3-geoip2",
        "python3-gevent",
        "python3-greenlet",
        "python3-idna",
        "python3-pil",
        "python3-jinja2",
        "python3-libsass",
        
        # After lxml 5.2, lxml-html-clean is in a separate package
        "python3-lxml-html-clean\\|python3-lxml",
        "python3-markupsafe",
        "python3-num2words",
        "python3-ofxparse",
        "python3-openpyxl",
        "python3-passlib",
        "python3-polib",
        "python3-psutil",
        "python3-psycopg2",
        "python3-openssl",
        "python3-pypdf2\\|python3-pypdf",
        "python3-rjsmin",
        "python3-qrcode",
        "python3-renderpm",
        "python3-reportlab",
        "python3-requests",
        "python3-stdnum",
        "python3-tz",
        "python3-urllib3",
        "python3-vobject",
        "python3-werkzeug",
        "python3-xlsxwriter",
        "python3-xlrd",
        "python3-zeep",
        "postgresql",
        "python3-ldap",


    ]

    [resources.database]
    type = "postgresql"
